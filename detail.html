<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프로젝트 이름</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container mt-3">
      <div class="card p-3">
        <span class="name">상품명</span><span class="price">가격</span>
      </div>
    </div>

    <form class="container my-5 form-group">
      <p>상품선택</p>
      <select class="form-select mt-2">
        <option>모자</option>
        <option>셔츠</option>
      </select>
      <select class="form-select mt-2 hide">
        <option>95</option>
        <option>100</option>
        <option>105</option>
      </select>
    </form>

    <div class="container mt-5">
      <ul class="list">
        <li class="tab-button" data-id="0">Products</li>
        <li class="tab-button orange" data-id="1">Information</li>
        <li class="tab-button" data-id="2">Shipping</li>
        <li class="tab-button" data-id="3">my page</li>
      </ul>
      <div class="tab-content">
        <p>상품설명입니다. Product</p>
      </div>
      <div class="tab-content show">
        <p>스펙설명입니다. Information</p>
      </div>
      <div class="tab-content">
        <p>배송정보입니다. Shipping</p>
      </div>
      <div class="tab-content">
        <p>마이페이지입니다. my page</p>
      </div>
    </div>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      const value = document.querySelectorAll(".form-select")[0].value;
      if (value == "셔츠") {
        document.querySelectorAll(".form-select")[1].classList.remove("hide");
      }

      let car = {
        name: "소나타",
        price: [50000, 3000, 4000],
      };
      document.querySelector(".name").innerText = car.name;
      document.querySelector(".price").innerText = car.price[2]; // 배열의 세 번째 요소인 4000이 가격으로 표시됩니다.

      // for (let i = 0; i < $(".tab-button").length; i++) {
      //   $(".tab-button")
      //     .eq(i)
      //     .on("click", function () {
      //       openTab(i);
      //     });
      // }
      // 위의 코드는 반복문을 사용하여 각 탭 버튼에 클릭 이벤트 리스너를 추가하는 방식입니다. 하지만 jQuery에서는 이벤트 위임을 사용하여 더 간결하게 작성할 수 있습니다.

      // 이벤트 위임을 사용하여 탭 버튼에 클릭 이벤트 리스너를 추가
      $(".list").click(function (e) {
        openTab(e.target.dataset.id);
      });

      function openTab(i) {
        $(".tab-button").removeClass("orange");
        $(".tab-button").eq(i).addClass("orange");

        $(".tab-content").removeClass("show");
        $(".tab-content").eq(i).addClass("show");
      }
    </script>
  </body>
</html>
