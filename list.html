<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프로젝트 이름</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <!-- <div class="col-sm-4">
          <img src="https://placehold.co/600" class="w-100" />
          <h5>Card title</h5>
          <p>가격 : 70000</p>
        </div> -->
      </div>
    </div>
    <div class="container">
      <button id="price" class="btn btn-danger" type="button">
        가격 별 정렬
      </button>
      <button id="title" class="btn btn-danger" type="button">
        상품명 별 정렬
      </button>
      <button id="price2" class="btn btn-danger" type="button">
        6만원 이하 정렬
      </button>
      <button id="more" class="btn btn-danger" type="button">더보기</button>

      <p id="loding" class="hide">상품을 로드할 수 없습니다.</p>
    </div>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script>
      let products = [
        { id: 0, price: 70000, title: "Blossom Dress" },
        { id: 1, price: 50000, title: "Springfield Shirt" },
        { id: 2, price: 60000, title: "Black Monastery" },
      ];

      //카드 생성 함수 데이터로 불러옴
      function cardCreate(data) {
        data.forEach((product) => {
          let card = `
                 <div class="col-sm-4 card">
                   <img src="https://placehold.co/600" class="w-100">
                   <h5 class="title">${product.title}</h5>
                   <p>가격 : ${product.price}</p>
                   <button class="buy">구매</button>
                 </div>`;
          document.querySelector(".row").insertAdjacentHTML("beforeend", card);
        });
      }

      cardCreate(products);

      localStorage.setItem("이름", "희진");

      let count = 0;

      //더보기 버튼 이벤트시 데이터 불러오는
      document.querySelector("#more").addEventListener("click", function () {
        count++;

        if (count == 1) {
          $.get("https://codingapple1.github.io/js/more1.json").done(
            function (data) {
              cardCreate(data);
            },
          );
        } else if (count == 2) {
          $.get("https://codingapple1.github.io/js/more2.json").done(
            function (data) {
              cardCreate(data);
            },
          );
        } else {
          const card = document.querySelector(".btn");

          card.classList.add("hide");
          document.querySelector("#loding").classList.remove("hide");
        }
      });

      //가격 별 정렬
      document.querySelector("#price").addEventListener("click", function () {
        products.sort(function (a, b) {
          return a.price - b.price; //내림차순
        });

        document.querySelector(".row").innerHTML = ""; //html 비우기
        cardCreate(products);
      });

      // 상품명 정렬
      $("#title").on("click", function () {
        products.sort(function (a, b) {
          return b.title.localeCompare(a.title); //문자열 내림차순
        });

        $(".row").html(""); //html 비우기
        cardCreate(products);
      });

      // 6만원 이하 정렬

      $("#price2").on("click", function () {
        let price = products.filter(function (a) {
          return a.price <= 60000;
        });

        $(".row").html(""); //html 비우기
        cardCreate(price);
      });

      $(".buy").on("click", function () {
        let title = $(this).siblings(".title").text(); // jQuery는 .text()
        localStorage.setItem("cart", title);
      });
    </script>
  </body>
</html>
