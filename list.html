<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프로젝트 이름</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <!-- <div class="col-sm-4">
          <img src="https://placehold.co/600" class="w-100" />
          <h5>Card title</h5>
          <p>가격 : 70000</p>
        </div> -->
      </div>
    </div>
    <div class="container">
      <button id="price" class="btn btn-danger" type="button">
        가격 별 정렬
      </button>
      <button id="title" class="btn btn-danger" type="button">
        상품명 별 정렬
      </button>
      <button id="price2" class="btn btn-danger" type="button">
        6만원 이하 정렬
      </button>
      <button id="more" class="btn btn-danger" type="button">더보기</button>

      <p id="loding" class="hide">상품을 로드할 수 없습니다.</p>
    </div>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script>
      // 상품 데이터 배열
      let products = [
        { id: 0, price: 70000, title: "Blossom Dress" },
        { id: 1, price: 50000, title: "Springfield Shirt" },
        { id: 2, price: 60000, title: "Black Monastery" },
      ];

      // 상품 데이터를 받아 카드 HTML을 생성하고 .row에 추가
      function cardCreate(data) {
        data.forEach((product) => {
          let card = `
                 <div class="col-sm-4 card">
                   <img src="https://placehold.co/600" class="w-100">
                   <h5 class="title">${product.title}</h5>
                   <p>가격 : ${product.price}</p>
                   <div class="qty-control">
                     <button class="qty-btn decrease" type="button">-</button>
                     <input type="number" class="qty-input" value="1" min="1" max="99">
                     <button class="qty-btn increase" type="button">+</button>
                    </div>
                   <button class="buy" type="button">담기</button>
                   </div>
                 </div>`;
          document.querySelector(".row").insertAdjacentHTML("beforeend", card);
        });
      }

      // 페이지 로드 시 초기 상품 카드 렌더링
      cardCreate(products);

      localStorage.setItem("이름", "희진");

      // 더보기 버튼 클릭 횟수 추적
      let count = 0;

      // 더보기 버튼 클릭 시 외부 JSON에서 추가 상품 로드 (최대 2회, 이후 버튼 숨김)
      document.querySelector("#more").addEventListener("click", function () {
        count++;

        if (count == 1) {
          $.get("https://codingapple1.github.io/js/more1.json").done(
            function (data) {
              cardCreate(data);
            },
          );
        } else if (count == 2) {
          $.get("https://codingapple1.github.io/js/more2.json").done(
            function (data) {
              cardCreate(data);
            },
          );
        } else {
          // 더 불러올 데이터 없음 → 버튼 숨기고 안내 문구 표시
          const card = document.querySelector(".btn");
          card.classList.add("hide");
          document.querySelector("#loding").classList.remove("hide");
        }
      });

      // 가격 오름차순 정렬 후 카드 재렌더링
      document.querySelector("#price").addEventListener("click", function () {
        products.sort(function (a, b) {
          return a.price - b.price;
        });
        document.querySelector(".row").innerHTML = "";
        cardCreate(products);
      });

      // 상품명 내림차순(가나다 역순) 정렬 후 카드 재렌더링
      $("#title").on("click", function () {
        products.sort(function (a, b) {
          return b.title.localeCompare(a.title);
        });
        $(".row").html("");
        cardCreate(products);
      });

      // 6만원 이하 상품만 필터링 후 카드 재렌더링
      $("#price2").on("click", function () {
        let price = products.filter(function (a) {
          return a.price <= 60000;
        });
        $(".row").html("");
        cardCreate(price);
      });

      // 수량 감소 버튼 클릭 시 해당 카드의 수량 1 감소 (최솟값 1)
      // 이벤트 위임 방식 — 동적으로 추가된 카드에도 동작
      $(document).on("click", ".decrease", function () {
        let qtyInput = $(this).siblings(".qty-input");
        let currentValue = parseInt(qtyInput.val());
        if (currentValue > 1) {
          qtyInput.val(currentValue - 1);
        }
      });

      // 수량 증가 버튼 클릭 시 해당 카드의 수량 1 증가 (최댓값 99)
      // 이벤트 위임 방식 — 동적으로 추가된 카드에도 동작
      $(document).on("click", ".increase", function () {
        let qtyInput = $(this).siblings(".qty-input");
        let currentValue = parseInt(qtyInput.val());
        if (currentValue < 99) {
          qtyInput.val(currentValue + 1);
        }
      });

      // 담기 버튼 클릭 시 해당 카드의 상품명과 수량을 로컬스토리지 cart 배열에 저장
      $(document).on("click", ".buy", function () {
        // 클릭한 카드의 상품명
        const title = $(this).siblings(".title").text();
        // 클릭한 카드의 수량 입력값 ($(this) 기준으로 탐색)
        const qty = $(this).siblings(".qty-control").find(".qty-input").val();
        // 로컬스토리지에서 cart 배열 가져오기 (없으면 null)

        let cart = JSON.parse(localStorage.getItem("cart")) ?? [];
        const last = cart[cart.length - 1];

        // 마지막 항목과 title 같으면 수량 합산, 다르면 새로 추가
        if (last && last.title === title) {
          last.qty = parseInt(last.qty) + parseInt(qty);
        } else {
          cart.push({ title, qty });
        }

        localStorage.setItem("cart", JSON.stringify(cart));
      });
    </script>
  </body>
</html>
