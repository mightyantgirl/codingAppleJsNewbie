<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프로젝트 이름</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="nav">
      <div class="navbar">
        <div>
          <span class="logo">logo</span>

          <span class="badge bg-dark">Dark 🔄</span>
        </div>
        <div class="scrollLoad"></div>
      </div>
    </div>

    <div class="login-container">
      <button class="login">로그인</button>
      <div class="black-bg">
        <div class="white-bg">
          <h4>로그인하세요</h4>
          <form action="./success.html">
            <div class="my-3">
              <input
                type="text"
                class="form-control"
                id="id"
                placeholder="@를 포함한 이메일 형식으로 입력하세요."
              />
            </div>
            <div class="my-3">
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="비밀번호를 입력하세요."
              />
            </div>
            <button type="submit" class="btn btn-primary">전송</button>
            <button type="button" class="btn btn-danger" id="close">
              닫기
            </button>
          </form>
        </div>
      </div>

      <div class="alert alert-danger">
        <span>5</span>초 이내 구매 시 사은품 증정!
      </div>
      <div class="container">
        <div class="slide-container">
          <div class="slide">
            <img src="car1-1.png" alt="" />
          </div>

          <div class="slide"><img src="car2-1.png" alt="" /></div>
          <div class="slide"><img src="car3-1.png" alt="" /></div>
        </div>
      </div>

      <button class="slide-1">1</button>
      <button class="slide-2">2</button>
      <button class="slide-3">3</button>
      <button class="prev">이전</button>
      <button class="next">다음</button>

      <div
        class="lorem"
        style="
          width: 200px;
          height: 100px;
          overflow-y: scroll;
          margin-top: 40px;
        "
      >
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Explicabo
        nostrum aut quae neque ex provident assumenda nemo excepturi, animi
        error corporis. Illo error excepturi vel repellendus sint. Itaque, quos
        voluptatem.
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script>
      // 로그인 버튼 클릭 시 모달 창을 보여주고, 닫기 버튼 클릭 시 모달 창을 숨김
      document
        .querySelector(".black-bg")
        .addEventListener("click", function (e) {
          if (e.target === document.querySelector(".black-bg")) {
            document.querySelector(".black-bg").classList.remove("show-modal");
            document.querySelector(".login").style.display = "block";
          }
        });

      // 스크롤이 99% 이상일 때 약관 동의 알림을 띄움
      document.querySelector(".lorem").addEventListener("scroll", function () {
        const scrollPercent =
          (this.scrollTop / (this.scrollHeight - this.clientHeight)) * 100;

        if (scrollPercent >= 99) {
          alert("약관에 동의하시겠습니까?");
        }
      });

      // 스크롤 이벤트 리스너를 추가하여 스크롤 위치에 따라 네비게이션 바의 스타일을 변경
      window.addEventListener("scroll", function () {
        var nav = document.querySelector(".nav");
        if (window.scrollY >= 100) {
          nav.querySelector(".logo").classList.add("scrolled");
          nav.classList.add("opacity");
        } else {
          nav.querySelector(".logo").classList.remove("scrolled");
          nav.classList.remove("opacity");
        }
      });

      var 지금사진 = 1;

      $(".next").on("click", function () {
        $(".slide-container").css(
          "transform",
          "translateX(-" + 지금사진 + "00vw)",
        );
        지금사진 += 1;
      });

      $(".prev").on("click", function () {
        $(".slide-container").css(
          "transform",
          "translateX(-" + 지금사진 + "00vw)",
        );
        지금사진 -= 2;
      });

      // 슬라이드 버튼 클릭 시 슬라이드 컨테이너의 위치를 변경하여 해당 슬라이드를 보여줌
      $(".slide-1").on("click", function () {
        $(".slide-container").css("transform", "translateX(0)");
      });
      $(".slide-2").on("click", function () {
        $(".slide-container").css("transform", "translateX(-100vw)");
      });
      $(".slide-3").on("click", function () {
        $(".slide-container").css("transform", "translateX(-200vw)");
      });

      $(".login").on("click", function () {
        $(".black-bg").addClass("show-modal");
        $(".white-bg").show();
        $(".login").hide();
      });
      $("#close").on("click", function () {
        $(".black-bg").removeClass("show-modal");
        $(".white-bg").hide();
        $(".login").show();
      });

      // 폼이 제출될 때 실행되는 이벤트 리스너
      document.querySelector("form").addEventListener("submit", function (e) {
        e.preventDefault();

        const id = document.querySelector("#id").value;
        const password = document.querySelector("#password").value;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const passwordRegex = /[A-Z]/;

        if (id === "") alert("아이디가 입력되지 않았습니다.");
        else if (!emailRegex.test(id))
          alert("아이디는 이메일 형식이어야 합니다.");
        else if (password === "") alert("비밀번호가 입력되지 않았습니다.");
        else if (!passwordRegex.test(password))
          alert("비밀번호는 대문자를 포함해야 합니다.");
        else if (password.length < 8)
          alert("비밀번호는 8자 이상이어야 합니다.");
      });

      // 클릭할 때마다 count가 1씩 증가
      var count = 0;
      $(".badge").on("click", function () {
        count += 1;
        if (count % 2 == 0) {
          document.querySelector(".badge").innerHTML = "Dark 🔄";
        } else {
          document.querySelector(".badge").innerHTML = "Light 🔄";
        }
      });

      //지정한 시간 후 코드를 실행 함
      //   setTimeout(function () {
      //     document.querySelector(".alert").style.display = "none";
      //     alert("5초가 지났습니다. 사은품 증정이 종료되었습니다.");
      //   }, 5000);

      //지정한 시간마다 코드를 실행 함
      setInterval(function () {
        var sec = document.querySelector(".alert span").innerHTML;

        if (sec > 0) {
          sec -= 1;

          document.querySelector(".alert span").innerHTML = sec;
        } else {
          document.querySelector(".alert").style.display = "none";
        }
      }, 1000);
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
